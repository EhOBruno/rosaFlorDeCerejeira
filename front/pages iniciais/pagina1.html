<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seu PC tanka?</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  </head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="img/logo.svg" alt="logo" id="logo">
      <input type="text" class="barra-pesquisa" 
      placeholder="Pesquise aqui...">
    </div>
    <div class="header-right">
      <button class="button-1">Sobre</button> 
      <button class="button-2">Login</button> 
    </div>
  </header>
  <main>
    <div id="main-left">
      <img src="./img/imagemInicial.svg" alt="imagem" id="imagem-inicial">
  
    </div>
    <div id="main-right">
      <p id="texto-inicial">QUERENDO SABER SE SUA <br> MÁQUINA "TANKA" SEUS<br>
        JOGOS FAVORITOS OU <br>
        UM NOVO LANÇAMENTO?</p>
      <p id="texto-secundario">
        FAÇA SEU CADASTRO E DESCUBRA, DE<br> 
        FORMA GRATUITA E ACESSÍVEL, SE ISSO É<br>
        POSSÍVEL COM A GENTE!
        </p>
    </div>
  </main>
  <main id="main-scroll">
    <div id="main-scroll-left">
      <p id="texto-scroll">COM SUA CONTA, VOCÊ RECEBE<br>
        INFORMAÇÕES PERSONALIZADAS<br>
        DE ACORDO COM SUAS ESPECIFICAÇÕES</p>
      <button id="botao-cadastro"> Cadastre-se</button>
      <p id="texto-intermedio">OU</p>
      <button id="botao-navegar">Navegue livremente</button>

    </div>

    <div id="main-scroll-right">
      <img id="imagem-scroll" src="./img/fotinhadamuia.svg" alt="imagem">

    </div>
  </main>
  <footer>  
    <a href="#">Sobre nós</a>
    <img src="./img/as_vert_cor.jpg" alt="Logo UnB" id="image-footer">
  </footer>
</body>
</html>
