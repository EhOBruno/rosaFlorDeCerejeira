<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seu PC tanka?</title>
  <link rel="stylesheet" href="style-3.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<body>
  <header class="cabecalho">
    <div class="header-left">
      <img src="img/logo.svg" alt="logo" id="logo">
    
    </div>
    <div class="header-right">
      <button class="botao-1">Sobre</button>  
    </div>
  </header>
  <main>
    <div>
      <h1>Selecione seus componentes</h1>
    </div>
    <form  action="" class="forms">
      <input type="Nome" class="input" placeholder="Processador">
      <button class="botao-escolha"></button>
    </form>
    
    <form action="" class="forms">
      <input type="Nome" class="input" placeholder="Placa de Vídeo">
      <button class="botao-escolha"></button>
    </form>
    
    <form action="" class="forms">
      <input type="Nome" class="input" placeholder="Memória RAM">
      <button class="botao-escolha"></button>
    </form>

    <div class="div-botao-finalizar"> 
      <button id="botao-finalizar">Finalizar</button>
    </div>
    
  </main>

</html>
